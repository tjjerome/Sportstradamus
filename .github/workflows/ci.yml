name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build deps
        # python-snappy compiles a C extension against libsnappy headers.
        run: sudo apt-get update && sudo apt-get install -y libsnappy-dev

      - name: Install Poetry
        run: pipx install poetry

      - name: Patch torch source for restricted networks
        # The pytorch_cpu source in pyproject.toml points at download.pytorch.org,
        # which sandboxed CI environments cannot always reach. Resolve torch from
        # PyPI instead — the wheel runs CPU-only just fine.
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("pyproject.toml")
          patched = re.sub(
              r'torch = \{version = "([^"]+)", source = "pytorch_cpu"\}',
              r'torch = "\1"',
              path.read_text(),
          )
          path.write_text(patched)
          PY

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Stage CI test fixtures (data + creds stubs)
        # Live config files are gitignored because they hold secrets or large
        # learned outputs. The committed stubs in tests/ci_fixtures/ have the
        # keys callers expect at import time, with placeholder values.
        run: |
          cp tests/ci_fixtures/data/*.json src/sportstradamus/data/
          cp tests/ci_fixtures/creds/keys.json src/sportstradamus/creds/keys.json

      - name: Lint (ruff check)
        run: poetry run ruff check src/ tests/

      - name: Format check (ruff format)
        run: poetry run ruff format --check src/ tests/

      - name: Golden tests
        run: poetry run pytest tests/golden/ -v

      - name: Integration smoke test
        # Fake mode (default): odds API, nba_api, scrapers, and Sheets are
        # all stubbed/canned. Live network calls only fire when
        # SPORTSTRADAMUS_INTEGRATION_REAL_APIS=1, which CI never sets.
        run: poetry run pytest tests/integration/ -m integration -v

      - name: Type check (mypy, advisory)
        # Does not gate merges; surfaces warnings only.
        continue-on-error: true
        run: poetry run mypy src/sportstradamus
